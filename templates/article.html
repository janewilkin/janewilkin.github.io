<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }} - Jane Wilkin</title>
  <meta name="description" content="{{ description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <nav class="site-nav">
    <div class="container container--wide">
      <a href="/" class="site-nav__name">Jane Wilkin</a>
      <ul class="site-nav__links">
        <li><a href="/">Home</a></li>
        <li><a href="/blog/" class="active">Writing</a></li>
        <li><a href="/recommendations/">Recommendations</a></li>
      </ul>
    </div>
  </nav>

  <main>
    <article>
      <div class="article-header">
        <div class="container">
          <a href="/blog/" class="article-header__back">&larr; Back to all articles</a>
          <h1>{{ title }}</h1>
          <div class="article-header__meta">
            <time>{{ date }}</time>
            <span>&middot;</span>
            <span>{{ reading_time }}</span>
          </div>
        </div>
      </div>

      <div class="article-body">
        <div class="container">
{{ content }}
        </div>
      </div>
    </article>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="site-footer__links">
        <a href="https://www.linkedin.com/in/janewilkin/" target="_blank" rel="noopener">LinkedIn</a>
        <a href="https://github.com/janewilkin" target="_blank" rel="noopener">GitHub</a>
        <a href="mailto:jane@janewilkin.dev">Email</a>
      </div>
      <p>&copy; 2026 Jane Wilkin</p>
    </div>
  </footer>

</body>
</html>
